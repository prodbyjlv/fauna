<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAUNA Plugin UI - PREVIEW</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            background:#000;
            min-height:100vh;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            color:white;
            padding:20px
        }
        .preview-label{position:fixed;top:10px;left:10px;background:rgba(255,0,0,0.8);color:white;padding:5px 10px;border-radius:5px;font-size:0.8em}
        .plugin-window{
            background:#1c1510;
            border:2px solid rgba(255,90,70,0.2);
            border-radius:14px;
            padding:18px;
            width:340px;
            max-width:100%;
            position:relative;
            overflow:hidden;
        }
        .watermark{
            position:absolute;
            inset:0;
            pointer-events:none;
            overflow:hidden;
            z-index:0;
        }
        .plugin-window > *:not(.watermark){
            position:relative;
            z-index:1;
        }
        .meta-row{
            display:flex;
            justify-content:space-between;
            width:100%;
        }
        .meta-col{display:flex;flex-direction:column;gap:3px}
        .meta-col.right{text-align:right}
        .meta-col.centre{text-align:center}
        .meta-label{font-size:9px;letter-spacing:2px;color:#ff5a46;opacity:0.8;text-transform:uppercase}
        .meta-value{font-size:10px;color:#f0e6d0;font-family:'Courier New',monospace}
        .divider{width:100%;height:1px;background:linear-gradient(90deg,rgba(255,90,70,0.5),transparent);margin-top:2px}
        .qr-panel{
            background:#f0e6d0;
            border-radius:12px;
            padding:10px;
            width:300px;
            height:300px;
            margin:10px auto;
            display:flex;
            align-items:center;
            justify-content:center;
        }
        .qr-panel svg{width:100%;height:100%}
        .footer{display:flex;align-items:center;gap:7px;margin-top:10px}
        .status-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;flex-shrink:0}
        .footer-text{font-size:10px;color:rgba(240,230,208,0.35);font-family:'Courier New',monospace}
        .dim{color:rgba(240,230,208,0.35)}
    </style>
</head>
<body>
    <div class="preview-label">PLUGIN UI PREVIEW - 340x400px</div>
    
    <div class="plugin-window">
        <div class="watermark">
            <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
                <defs>
                    <pattern id="fauna-pattern" x="0" y="0" width="86" height="32"
                             patternUnits="userSpaceOnUse"
                             patternTransform="rotate(-30)">
                        <text x="0" y="22" font-family="Arial,sans-serif" font-weight="900" font-size="18" fill="#ff5a46" opacity="0.08">FAUNA</text>
                    </pattern>
                </defs>
                <rect width="100%" height="100%" fill="url(#fauna-pattern)"/>
            </svg>
        </div>
        
        <div class="meta-row">
            <div class="meta-col">
                <span class="meta-label">URL</span>
                <span class="meta-value">http://192.168.1.100:8080</span>
            </div>
            <div class="meta-col centre">
                <span class="meta-label">Port</span>
                <span class="meta-value">8080</span>
            </div>
            <div class="meta-col right">
                <span class="meta-label">SR</span>
                <span class="meta-value">44100 Hz</span>
            </div>
        </div>
        <div class="divider"></div>
        
        <div class="qr-panel">
            <svg viewBox="0 0 210 210" xmlns="http://www.w3.org/2000/svg">
                <rect fill="#f0e6d0" width="210" height="210"/>
                <g fill="#1c1510">
                    <rect x="10" y="10" width="50" height="50"/>
                    <rect x="15" y="15" width="40" height="40" fill="#f0e6d0"/>
                    <rect x="20" y="20" width="30" height="30"/>
                    <rect x="150" y="10" width="50" height="50"/>
                    <rect x="155" y="15" width="40" height="40" fill="#f0e6d0"/>
                    <rect x="160" y="20" width="30" height="30"/>
                    <rect x="10" y="150" width="50" height="50"/>
                    <rect x="15" y="155" width="40" height="40" fill="#f0e6d0"/>
                    <rect x="20" y="160" width="30" height="30"/>
                    <rect x="70" y="10" width="10" height="10"/>
                    <rect x="90" y="10" width="20" height="10"/>
                    <rect x="120" y="10" width="20" height="10"/>
                    <rect x="70" y="20" width="30" height="10"/>
                    <rect x="110" y="30" width="10" height="10"/>
                    <rect x="130" y="20" width="10" height="20"/>
                    <rect x="70" y="40" width="20" height="10"/>
                    <rect x="100" y="40" width="10" height="10"/>
                    <rect x="70" y="70" width="10" height="20"/>
                    <rect x="30" y="70" width="20" height="10"/>
                    <rect x="10" y="100" width="30" height="10"/>
                    <rect x="30" y="120" width="10" height="20"/>
                    <rect x="70" y="70" width="20" height="10"/>
                    <rect x="100" y="70" width="10" height="20"/>
                    <rect x="120" y="70" width="20" height="10"/>
                    <rect x="150" y="70" width="20" height="10"/>
                    <rect x="170" y="80" width="20" height="10"/>
                    <rect x="150" y="100" width="10" height="10"/>
                    <rect x="170" y="100" width="10" height="20"/>
                    <rect x="70" y="150" width="20" height="10"/>
                    <rect x="100" y="150" width="10" height="20"/>
                    <rect x="120" y="160" width="20" height="10"/>
                    <rect x="70" y="170" width="10" height="20"/>
                    <rect x="90" y="180" width="30" height="10"/>
                    <rect x="150" y="150" width="20" height="10"/>
                    <rect x="180" y="150" width="20" height="10"/>
                    <rect x="150" y="170" width="10" height="20"/>
                    <rect x="170" y="160" width="20" height="10"/>
                </g>
            </svg>
        </div>
        
        <div class="footer">
            <div class="status-dot"></div>
            <span class="footer-text">1 device connected</span>
        </div>
    </div>
    
    <div style="margin-top:30px;text-align:center;color:#666;font-size:12px;">
        <p>FAUNA Plugin Editor - Dark warm theme</p>
        <p>340x400 pixels</p>
    </div>
</body>
</html>
