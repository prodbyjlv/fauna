<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAUNA Audio Stream</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            backdrop-filter: blur(10px);
            max-width: 400px;
            width: 100%;
        }
        h1 { font-size: 2em; margin-bottom: 10px; color: #00d4ff; }
        .status { font-size: 0.9em; color: #aaa; margin-bottom: 30px; }
        .level-meter {
            width: 100%;
            height: 30px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 30px;
        }
        .level-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ff88, #00d4ff, #ffaa00, #ff4444);
            transition: width 0.1s;
            border-radius: 15px;
        }
        .mute-btn {
            padding: 20px 60px;
            font-size: 1.5em;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        .mute-btn.muted { background: #ff4444; color: white; }
        .mute-btn.unmuted { background: #00ff88; color: #1a1a2e; }
        .mute-btn:hover { transform: scale(1.05); }
        .connection-status { margin-top: 20px; font-size: 0.8em; color: #888; }
        .connected { color: #00ff88; }
        .info-box {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .info-box p { margin: 5px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>FAUNA</h1>
        <p class="status">Audio Streaming Control</p>
        
        <div class="info-box">
            <p><strong>Server Status:</strong> <span id="serverStatus">Checking...</span></p>
            <p><strong>Connected Devices:</strong> <span id="deviceCount">0</span></p>
        </div>
        
        <div class="level-meter">
            <div class="level-bar" id="levelBar"></div>
        </div>
        
        <button class="mute-btn unmuted" id="muteBtn" onclick="toggleMute()">UNMUTED</button>
        
        <p class="connection-status" id="status">Ready</p>
    </div>

    <script>
        var isMuted = false;
        
        function updateStatus() {
            fetch("/status")
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    document.getElementById("serverStatus").textContent = "Running";
                    document.getElementById("serverStatus").className = "connected";
                    document.getElementById("deviceCount").textContent = data.clients;
                })
                .catch(function() {
                    document.getElementById("serverStatus").textContent = "Not Running";
                    document.getElementById("serverStatus").style.color = "#ff4444";
                });
        }
        
        function toggleMute() {
            isMuted = !isMuted;
            var btn = document.getElementById("muteBtn");
            if (isMuted) {
                btn.textContent = "MUTED";
                btn.className = "mute-btn muted";
            } else {
                btn.textContent = "UNMUTED";
                btn.className = "mute-btn unmuted";
            }
            document.getElementById("status").textContent = isMuted ? "Muted" : "Unmuted";
        }
        
        updateStatus();
        setInterval(updateStatus, 2000);
    </script>
</body>
</html>
