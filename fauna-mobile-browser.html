<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FAUNA Mobile Browser - PREVIEW</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        :root{
            --bg:#1c1510;
            --cream:#f0e6d0;
            --coral:#ff5a46;
            --green:#4ade80;
            --dim:rgba(240,230,208,0.35);
            --card-bg:rgba(240,230,208,0.05);
            --card-border:rgba(255,90,70,0.2)
        }
        body{
            background:var(--bg);
            min-height:100dvh;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            color:var(--cream);
            font-family:'Courier New',monospace;
            padding:24px 20px;
            position:relative;
            overflow-x:hidden
        }
        .watermark{
            position:fixed;
            inset:0;
            pointer-events:none;
            overflow:hidden;
            z-index:0
        }
        .container{
            position:relative;
            z-index:1;
            width:100%;
            max-width:380px;
            display:flex;
            flex-direction:column;
            gap:16px;
            background:rgba(0,0,0,0.2);
            border-radius:20px;
            padding:20px
        }
        .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .info-card{
            background:var(--card-bg);
            border:0.5px solid var(--card-border);
            border-radius:12px;
            padding:16px
        }
        .info-card .card-label{
            font-size:9px;
            letter-spacing:2px;
            color:var(--coral);
            opacity:0.8;
            text-transform:uppercase;
            margin-bottom:6px
        }
        .info-card .card-value{
            font-size:13px;
            color:var(--cream)
        }
        .info-card .card-value.status-ok{color:var(--green)}
        .info-card .card-value.status-warn{color:var(--coral)}
        .level-section{display:flex;flex-direction:column;gap:10px}
        .level-label{
            font-size:9px;
            letter-spacing:2px;
            color:var(--coral);
            opacity:0.8;
            text-transform:uppercase
        }
        .level-track{
            width:100%;
            height:12px;
            background:rgba(240,230,208,0.08);
            border-radius:8px;
            overflow:hidden
        }
        .level-bar{
            height:100%;
            width:60%;
            background:linear-gradient(90deg,var(--coral),var(--cream));
            border-radius:8px;
            transition:width 0.07s linear
        }
        .level-bar.muted{background:rgba(240,230,208,0.15)}
        .divider{
            width:100%;
            height:0.5px;
            background:linear-gradient(90deg,var(--coral),transparent);
            opacity:0.4
        }
        .mute-btn{
            width:100%;
            padding:24px;
            font-family:'Courier New',monospace;
            font-size:14px;
            font-weight:700;
            letter-spacing:4px;
            border-radius:12px;
            cursor:pointer;
            transition:opacity 0.15s,transform 0.1s;
            border:1.5px solid var(--green);
            background:transparent;
            color:var(--green)
        }
        .mute-btn.muted{
            border-color:var(--coral);
            color:var(--coral)
        }
        .mute-btn:active{transform:scale(0.98);opacity:0.85}
        .start-btn{
            width:100%;
            padding:20px;
            font-family:'Courier New',monospace;
            font-size:14px;
            font-weight:700;
            letter-spacing:2px;
            border-radius:12px;
            cursor:pointer;
            transition:opacity 0.15s,transform 0.1s;
            border:1.5px solid var(--coral);
            background:transparent;
            color:var(--coral)
        }
        .start-btn:active{transform:scale(0.98);opacity:0.85}
        .start-btn:disabled{opacity:0.5;cursor:not-allowed}
        .footer{
            display:flex;
            align-items:center;
            justify-content:center;
            gap:8px
        }
        .status-dot{
            width:6px;
            height:6px;
            border-radius:50%;
            background:var(--green);
            flex-shrink:0
        }
        .status-dot.disconnected{
            background:var(--coral);
            opacity:0.5
        }
        .footer-text{font-size:10px;color:var(--dim)}
        .preview-label{position:fixed;top:10px;left:10px;background:rgba(255,0,0,0.8);color:white;padding:5px 10px;border-radius:5px;font-size:0.8em}
    </style>
</head>
<body>
    <div class="preview-label">MOBILE BROWSER PREVIEW</div>
    
    <div class="watermark">
        <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
            <defs>
                <pattern id="fauna-pattern" x="0" y="0" width="86" height="32"
                         patternUnits="userSpaceOnUse"
                         patternTransform="rotate(-30)">
                    <text x="0" y="22" font-family="Arial,sans-serif" font-weight="900" font-size="18" fill="#ff5a46" opacity="0.08">FAUNA</text>
                </pattern>
            </defs>
            <rect width="100%" height="100%" fill="url(#fauna-pattern)"/>
        </svg>
    </div>

    <div class="container">
        <div class="info-grid">
            <div class="info-card">
                <div class="card-label">Server</div>
                <div class="card-value status-ok" id="serverStatus">Running</div>
            </div>
            <div class="info-card">
                <div class="card-label">Audio</div>
                <div class="card-value status-ok" id="audioStatus">Playing</div>
            </div>
            <div class="info-card">
                <div class="card-label">Sample Rate</div>
                <div class="card-value" id="srStatus">44100 Hz</div>
            </div>
            <div class="info-card">
                <div class="card-label">Buffer</div>
                <div class="card-value" id="bufStatus">8192 frames</div>
            </div>
        </div>

        <div class="divider"></div>

        <div class="level-section">
            <div class="level-label">Level</div>
            <div class="level-track">
                <div class="level-bar" id="levelBar"></div>
            </div>
        </div>

        <div class="divider"></div>

        <button class="start-btn" id="startBtn">START AUDIO</button>
        <button class="mute-btn" id="muteBtn">UNMUTED</button>

        <div class="footer">
            <div class="status-dot" id="statusDot"></div>
            <span class="footer-text" id="footerText">Connected</span>
        </div>
    </div>

    <script>
        var isMuted = false;
        var animationFrame = 0;
        
        function animateLevel() {
            var level = 40 + Math.random() * 50;
            document.getElementById('levelBar').style.width = level + '%';
            animationFrame = requestAnimationFrame(animateLevel);
        }
        animateLevel();
        
        document.getElementById('muteBtn').addEventListener('click', function() {
            isMuted = !isMuted;
            var btn = document.getElementById('muteBtn');
            var bar = document.getElementById('levelBar');
            if (isMuted) {
                btn.textContent = 'MUTED';
                btn.classList.add('muted');
                bar.style.width = '0%';
                bar.classList.add('muted');
            } else {
                btn.textContent = 'UNMUTED';
                btn.classList.remove('muted');
                bar.classList.remove('muted');
            }
        });
    </script>
</body>
</html>
