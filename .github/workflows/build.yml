name: Build FAUNA

on:
  push:
    branches: [master, mv1]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure
        shell: bash
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022"

      - name: Build
        shell: bash
        run: |
          cmake --build build --config Release

      - name: Find VST3
        run: |
          Get-ChildItem -Path build -Filter "*.vst3" -Recurse

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FAUNA-Windows-VST3
          path: build/FAUNA_artefacts/Release/VST3/FAUNA.vst3
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure macOS
        run: |
          cmake -S . -B build -G Xcode

      - name: Build Audio Unit
        run: |
          cmake --build build --config Release

      - name: Find and copy Audio Unit
        run: |
          COMPONENT=$(find ~/Library/Developer/Xcode/DerivedData -name "FAUNA.component" -type d 2>/dev/null | head -1)
          echo "Found: $COMPONENT"
          mkdir -p artifacts
          cp -r "$COMPONENT" artifacts/
          ls -la artifacts/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FAUNA-macOS-AU
          path: artifacts/FAUNA.component
          retention-days: 30